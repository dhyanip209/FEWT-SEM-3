//3. WAP to read an array from the user and sort them using bubble sort. (A)

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        

let n=parseInt(prompt("enter size"));
let a=[];
for(let i=0;i<n;i++){
    a[i]=parseInt(prompt("enter number"))
}
document.write(a)
for(i=0;i<=n;i++){
    for(j=i+1;j<=n-1;j++){
        if(a[i]>a[j]){
            let temp=a[i]
            a[i]=a[j]
            a[j]=temp
        }
    } 
}
document.write("</br>")
document.write(a)

    </script>

</body>
</html>

//1. Demonstrate the use of array to ƒind maximum number. (A)

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("Enter size:"));
        let a=[];
        for (let i=0; i<n; i++) {
            a[i]=parseInt(prompt("Enter a number:"));
        }
        for (let i=0; i<n; i++) {
            document.write(a[i]);
        }
        let max=a[0]
        for(i=0;i<n;i++){
            if(a[i]>max){
                max=a[i]
            }
        }
        document.write("</br>")
        document.write("max="+max)
    </script>

</body>
</html>

//1. WAP in JavaScript to make simple calculator using popup box. (A)

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n1=parseInt(prompt("ENTER N1"))
                let n2=parseInt(prompt("ENTER N2"))
                let op=prompt("enter operation:  +,-,*,/")
                let ans
if(op=='+'){
    ans=n1+n2
}
else if(op=='-')
{
    ans=n1-n2
}
else if(op=='*')
{
    ans=n1*n2
}
else if(op=='/')
{
    ans=n1/n2
}
document.write("ans  :"+ans)
    </script>
</body>
</html>

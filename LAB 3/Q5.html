//5. WAP in JavaScript to check whether the given number is palindrome or not. (A)

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("Enter a number:"));
        let rev = 0;
        let digit;
        let temp = n;

        while (n != 0) {
            digit = n % 10;
            rev = (rev * 10) + digit;
            n = parseInt(n / 10);
        }

        if (rev == temp) {
            document.write(temp + " is a palindrome");
        } else {
            document.write(temp + " is not a palindrome");
        }
    </script>
</body>
</html>

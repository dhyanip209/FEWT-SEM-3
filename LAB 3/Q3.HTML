//3. WAP in JavaScript to ƒnd the factorial of given number. (A)

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("enter n"))
        let fact=1
              for (i = 1; i <= n; i++) {
                fact=fact*i;
              }
              document.write(fact)
    </script>
</body>
</html>
